# - 普通 push/PR：仅上传 Actions Artifacts（有过期时间，不是 Release）
# - 推送 tag（如 v0.1.0）：构建后自动创建 GitHub Release 并附上各平台安装包
# 说明：GitHub 只执行「仓库根目录」下的 .github/workflows；monorepo 请拷到根目录并改路径前缀。
name: Desktop (Tauri)

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

concurrency:
  group: tauri-desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: agentsphere-${{ matrix.os }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: error

  # 仅在推送 v* tag 时执行：把各平台产物汇总为 GitHub Release（不是 Artifact）
  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          pattern: agentsphere-*
          path: bundles
          merge-multiple: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            bundles/**/*

